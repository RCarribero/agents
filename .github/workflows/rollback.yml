name: Rollback — Automatic revert on pipeline failure

on:
  workflow_run:
    workflows: ["CI — Tests + Lint + Security"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  rollback:
    name: Auto-rollback if CI failed on main
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get commit info
        id: info
        run: |
          echo "sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          echo "prev_sha=$(git rev-parse HEAD^1)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --format='%an' ${{ github.event.workflow_run.head_sha }})" >> $GITHUB_OUTPUT

      - name: Revert failed commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git revert --no-edit ${{ steps.info.outputs.sha }}
          git push origin main

      - name: Create issue for failed deploy
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Auto-rollback: CI failed on main (${context.sha.slice(0,7)})`,
              body: [
                '## Auto-rollback ejecutado',
                '',
                `- **Commit revertido:** \`${{ steps.info.outputs.sha }}\``,
                `- **Autor:** ${{ steps.info.outputs.author }}`,
                `- **Workflow:** [CI Run](${{ github.event.workflow_run.html_url }})`,
                '',
                '## Acción requerida',
                '',
                '1. Revisar los logs del CI para identificar la causa del fallo',
                '2. Corregir el problema en una rama feature/* o fix/*',
                '3. Crear PR con triple aprobación (auditor + qa + red_team) antes de mergear',
                '',
                '*Este issue fue creado automáticamente por el workflow de rollback.*'
              ].join('\n'),
              labels: ['bug', 'auto-rollback', 'needs-review']
            });
