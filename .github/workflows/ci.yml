name: CI - Multi Client Toolkit

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.changes.outputs.node }}
      agents: ${{ steps.changes.outputs.agents }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            node:
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'packages/**'
              - 'tests/multi-client-install.contract.test.mjs'
              - '.github/workflows/ci.yml'
            agents:
              - 'agents/**'
              - 'scripts/eval_runner_ci.py'

  node-contracts:
    name: Node contracts
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.node == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack
        run: corepack enable

      - name: Run contract tests
        run: pnpm test

  agent-evals:
    name: Agent contract evals
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.agents == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run structural agent evals
        run: python scripts/eval_runner_ci.py --output eval-results.json

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-eval-results
          path: eval-results.json
          retention-days: 7
